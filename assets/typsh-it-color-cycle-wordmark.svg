<svg xmlns="http://www.w3.org/2000/svg" width="858" height="220" viewBox="0 0 858 220" role="img" aria-labelledby="title desc">
  <title id="title">TYPSH.IT animated neon wordmark</title>
  <desc id="desc">Transparent uppercase TYPSH.IT wordmark inside a neon outline box that blends the two boxed logo variants while animating color.</desc>
  <defs>
    <filter id="typsh-neon-glow" x="-14%" y="-42%" width="128%" height="190%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur-1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur-2" />
      <feMerge>
        <feMergeNode in="blur-2" />
        <feMergeNode in="blur-1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(89 56)" fill="none" stroke-linejoin="miter" stroke-linecap="square">
    <g filter="url(#typsh-neon-glow)" opacity="0.31" stroke-width="10.4">
      <animate attributeName="stroke" values="#16B4FF;#7CFF2A;#FF47B7;#8B5CFF;#16B4FF" dur="11s" repeatCount="indefinite" />
      <rect x="0" y="0" width="680" height="108" />
      <text x="30" y="80" textLength="620" lengthAdjust="spacing" font-family="Arial Black, Impact, Haettenschweiler, sans-serif" font-size="84" font-weight="800" letter-spacing="0">TYPSH.IT</text>
    </g>
    <g stroke-width="3.8">
      <animate attributeName="stroke" values="#16B4FF;#7CFF2A;#FF47B7;#8B5CFF;#16B4FF" dur="11s" repeatCount="indefinite" />
      <rect x="0" y="0" width="680" height="108" />
      <text x="30" y="80" textLength="620" lengthAdjust="spacing" font-family="Arial Black, Impact, Haettenschweiler, sans-serif" font-size="84" font-weight="800" letter-spacing="0">TYPSH.IT</text>
    </g>
  </g>
</svg>