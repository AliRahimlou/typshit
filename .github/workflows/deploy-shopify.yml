name: Deploy Shopify

# Updating this workflow file itself is a valid way to force a deploy pipeline test.

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-shopify.yml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "config.ts"
      - "openai.ts"
      - "server.ts"
      - "shopify.ts"
      - "types.ts"
      - "routes/**"
      - "scripts/**"
      - "tools/**"
      - "data/**"
      - "theme/assets/**"
      - "theme/sections/**"
      - "theme/snippets/**"
      - "theme/templates/**"
  workflow_dispatch:

concurrency:
  group: deploy-shopify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      SHOPIFY_FLAG_FORCE: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
      SHOPIFY_ADMIN_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ADMIN_ACCESS_TOKEN }}
      SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
      SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
      SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
      SHOPIFY_THEME_STORE: ${{ secrets.SHOPIFY_THEME_STORE }}
      SHOPIFY_THEME_ID: ${{ secrets.SHOPIFY_THEME_ID }}
      SHOPIFY_THEME_PATH: theme
      SHOPIFY_THEME_ALLOW_LIVE: ${{ secrets.SHOPIFY_THEME_ALLOW_LIVE }}
      SHOPIFY_THEME_PUBLISH_ON_PUSH: ${{ secrets.SHOPIFY_THEME_PUBLISH_ON_PUSH }}
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
      STORE_SYNC_ZENDROP_ASSETS: ${{ secrets.STORE_SYNC_ZENDROP_ASSETS }}
      ZENDROP_MCP_URL: ${{ secrets.ZENDROP_MCP_URL }}
      ZENDROP_CLIENT_ID: ${{ secrets.ZENDROP_CLIENT_ID }}
      ZENDROP_ACCESS_TOKEN: ${{ secrets.ZENDROP_ACCESS_TOKEN }}
      ZENDROP_REFRESH_TOKEN: ${{ secrets.ZENDROP_REFRESH_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Deploy store and theme
        run: npm run store:deploy